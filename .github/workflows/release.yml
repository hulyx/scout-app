name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r scout/requirements.txt
          pip install pyinstaller matplotlib

      - name: Build .exe
        run: pyinstaller scout/scout_gui.spec

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Scout ${{ github.ref_name }}"
          files: "dist/Scout.exe"
          generate_release_notes: true
